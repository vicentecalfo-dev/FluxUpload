services:
  postgres:
    image: postgres:16-alpine
    container_name: flux-upload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flux_upload
    ports:
      - '5432:5432'
    volumes:
      - flux-upload-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d flux_upload']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: flux-upload-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - flux-upload-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    container_name: flux-upload-minio-init
    depends_on:
      - minio
    restart: 'no'
    volumes:
      - ./minio/cors.json:/config/cors.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        echo "Waiting for MinIO..."
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done

        echo "Creating bucket flux-upload (if missing)..."
        mc mb --ignore-existing local/flux-upload

        echo "Applying CORS policy..."
        mc cors set local/flux-upload /config/cors.json

        echo "MinIO initialization complete."

volumes:
  flux-upload-postgres-data:
  flux-upload-minio-data:
